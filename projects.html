<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>研究計畫 | 智慧醫療轉譯及創新實驗室</title>
  <meta name="description" content="智慧醫療轉譯及創新實驗室進行中的研究計畫：國科會失樂感監測、照護產業科技化指數、擬真教育成效分析、AI 虛擬人教學研究。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Inter:wght@500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <main>
    <section class="page-hero">
      <div class="blob blob-violet" style="width:360px;height:360px;top:-100px;right:10%"></div>
      <div class="blob blob-cyan" style="width:280px;height:280px;bottom:-100px;left:-60px"></div>
      <div class="container">
        <span class="icon-badge" data-icon="projects" style="margin-bottom:16px"></span>
        <p class="mono-label">[GRANTS.AND.STUDIES]</p>
        <h1>研究計畫</h1>
        <p>研究案橫跨數位心理健康、護理教育科技、智慧照護、照護產業科技化與臨床訓練轉譯，以「智慧醫療轉譯及創新」為共同語言整合成可延展的研究組合。</p>
      </div>
    </section>

    <section class="section" style="padding-top:40px">
      <div class="container">
        <div class="project-list" data-stagger id="project-list"></div>
        <p class="mono-label" id="sync-note" style="margin-top:28px"></p>
      </div>
    </section>
  </main>

  <script src="js/icons.js"></script>
  <script src="js/components.js"></script>
  <script src="js/data.js"></script>
  <script src="js/enrich.js"></script>
  <script src="js/nstc-render.js"></script>
  <script src="js/animations.js"></script>
  <script>
    initLayout("projects");
    (async () => {
      const data = await fetchNstc();
      renderProjects(document.getElementById("project-list"), data);
      renderSyncNote(document.getElementById("sync-note"), data);
      initReveal();
    })();
  </script>
</body>
</html>
