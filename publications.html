<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>成果發表 | 智慧醫療轉譯及創新實驗室</title>
  <meta name="description" content="智慧醫療轉譯及創新實驗室發表論文：期刊論文與研討會論文列表。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Inter:wght@500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <main>
    <section class="page-hero">
      <div class="blob blob-violet" style="width:340px;height:340px;top:-90px;right:8%"></div>
      <div class="blob blob-cyan" style="width:280px;height:280px;bottom:-110px;left:-60px"></div>
      <div class="container">
        <span class="icon-badge" data-icon="publications" style="margin-bottom:16px"></span>
        <p class="mono-label">[PUBLICATIONS]</p>
        <h1>成果發表</h1>
        <p>同步自國科會研究人才網，含期刊論文與研討會論文。</p>
        <div class="hero-actions" style="margin-top:22px">
          <a class="btn btn-primary" href="https://scholar.google.com/citations?user=sa65IacAAAAJ&amp;hl=zh-TW" target="_blank" rel="noopener">Google Scholar 個人頁 <span class="arrow">↗</span></a>
        </div>
      </div>
    </section>

    <section class="section" style="padding-top:40px">
      <div class="container">
        <div id="pub-groups"></div>
        <p class="mono-label" id="sync-note" style="margin-top:28px"></p>
      </div>
    </section>
  </main>

  <script src="js/icons.js"></script>
  <script src="js/components.js"></script>
  <script src="js/data.js"></script>
  <script src="js/enrich.js"></script>
  <script src="js/nstc-render.js"></script>
  <script src="js/animations.js"></script>
  <script>
    initLayout("publications");
    (async () => {
      const data = await fetchNstc();
      renderPublications(document.getElementById("pub-groups"), data);
      renderSyncNote(document.getElementById("sync-note"), data);
      initReveal();
    })();
  </script>
</body>
</html>
