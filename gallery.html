<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動花絮｜智慧醫療轉譯及創新實驗室</title>
  <meta name="description" content="智慧醫療轉譯及創新實驗室活動花絮：研討會、實驗室活動與臨床場域的紀錄。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Inter:wght@500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body>
  <!-- ==========================================================================
       Page hero
       ========================================================================== -->
  <section class="section section--tint page-hero">
    <div class="dots" style="position: absolute; inset: 0; z-index: 0;"></div>
    <div class="container page-hero__inner reveal">
      <span class="mono-en page-hero__label">GALLERY</span>
      <h1 class="page-hero__title">活動花絮</h1>
      <p class="page-hero__desc">研討會、實驗室活動與臨床場域的紀錄。照片同步自實驗室雲端相簿，點擊可放大檢視。</p>
    </div>
  </section>

  <div class="ecg-divider"></div>

  <!-- ==========================================================================
       照片牆
       ========================================================================== -->
  <section class="section">
    <div class="container">
      <div class="section-header reveal">
        <h2 class="section-header__title">
          <span class="section-header__icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <defs>
                <linearGradient id="gallery-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#00E3E3"/>
                  <stop offset="100%" stop-color="#6A6AFF"/>
                </linearGradient>
              </defs>
              <path d="M12 1.8l8.4 4.85v9.7L12 21.2l-8.4-4.85v-9.7L12 1.8z" fill="none" stroke="url(#gallery-logo-grad)" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M12 7.6v7.2M8.4 11.2h7.2" fill="none" stroke="url(#gallery-logo-grad)" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          精彩紀錄
        </h2>
        <span class="mono-en">MOMENTS</span>
      </div>

      <div class="photo-wall" id="photo-wall">
        <!-- renderPhotoWall() populates this from fetchPhotos(0) -->
      </div>
    </div>
  </section>

  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/animations.js"></script>
  <script>
    initLayout('gallery');
    initReveal();

    function escapeHtml(str) {
      if (!str) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function renderPhotoWall() {
      const wall = document.getElementById('photo-wall');
      if (!wall) return;
      const photos = await fetchPhotos(0);
      wall.innerHTML = photos.map((photo, i) => `
<button type="button" class="photo-wall__item reveal" data-reveal-group="photo" data-src="${escapeHtml(photo.src)}" data-caption="${escapeHtml(photo.caption)}" aria-label="放大檢視：${escapeHtml(photo.caption)}">
  <img src="${escapeHtml(photo.thumb)}" alt="${escapeHtml(photo.caption)}" loading="lazy">
</button>`).join('');

      wall.querySelectorAll('.photo-wall__item').forEach((btn) => {
        btn.addEventListener('click', () => {
          openLightbox(btn.dataset.src, btn.dataset.caption);
        });
      });

      initReveal();
    }

    renderPhotoWall();
  </script>
</body>
</html>
