<body>
  <!-- ==========================================================================
       Page hero
       ========================================================================== -->
  <section class="section section--tint page-hero">
    <div class="dots" style="position: absolute; inset: 0; z-index: 0;"></div>
    <div class="container page-hero__inner reveal">
      <span class="mono-en page-hero__label">GALLERY</span>
      <h1 class="page-hero__title">活動花絮</h1>
      <p class="page-hero__desc">研討會、實驗室活動與臨床場域的紀錄。照片同步自實驗室雲端相簿，點擊可放大檢視。</p>
    </div>
  </section>

  <div class="ecg-divider"></div>

  <!-- ==========================================================================
       照片牆
       ========================================================================== -->
  <section class="section">
    <div class="container">
      <div class="section-header reveal">
        <h2 class="section-header__title">
          <span class="section-header__icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <defs>
                <linearGradient id="gallery-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#4568C8"/>
                  <stop offset="100%" stop-color="#7668D8"/>
                </linearGradient>
              </defs>
              <path d="M12 1.8l8.4 4.85v9.7L12 21.2l-8.4-4.85v-9.7L12 1.8z" fill="none" stroke="url(#gallery-logo-grad)" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M12 7.6v7.2M8.4 11.2h7.2" fill="none" stroke="url(#gallery-logo-grad)" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          精彩紀錄
        </h2>
        <span class="mono-en">MOMENTS</span>
      </div>

      <div class="gallery-filter" id="gallery-filter" role="group" aria-label="照片分類篩選"></div>

      <div class="photo-wall" id="photo-wall">
        <!-- renderPhotoWall() populates this from fetchPhotos(0) -->
      </div>
    </div>
  </section>

  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/animations.js"></script>
  <script>
    initLayout('gallery');
    initReveal();

    function escapeHtml(str) {
      if (!str) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    /* 照片依檔名（＝說明文字）關鍵字自動分類：口試／研討會／報告，其餘歸「其他」 */
    const GALLERY_TAGS = [
      { key: "all", zh: "全部", en: "All" },
      { key: "defense", zh: "口試", en: "Defense", re: /口試/i },
      { key: "conference", zh: "研討會", en: "Conference", re: /(研討會|會議|論壇|年會|eafons|amee|inrc|icn|wans|sigma|congress|forum|conference)/i },
      { key: "talk", zh: "報告", en: "Talk", re: /(報告|發表|演講|seminar|presentation)/i },
      { key: "other", zh: "其他", en: "Other" }
    ];
    const IS_EN = (document.documentElement.lang || "").toLowerCase().indexOf("en") === 0;

    function classifyPhoto(caption) {
      for (const tag of GALLERY_TAGS) {
        if (tag.re && tag.re.test(caption || "")) return tag.key;
      }
      return "other";
    }

    function renderFilter(counts) {
      const bar = document.getElementById('gallery-filter');
      if (!bar) return;
      const available = GALLERY_TAGS.filter((t) => t.key === "all" || counts[t.key]);
      if (available.length <= 2) { bar.hidden = true; return; } /* 只有「全部＋單一類」時不顯示篩選 */
      bar.innerHTML = available
        .map((t) => `<button type="button" class="chip gallery-filter__chip${t.key === "all" ? " chip--active" : ""}" data-tag="${t.key}">${IS_EN ? t.en : t.zh}</button>`)
        .join('');
      bar.addEventListener('click', (e) => {
        const btn = e.target.closest('.gallery-filter__chip');
        if (!btn) return;
        bar.querySelectorAll('.gallery-filter__chip').forEach((c) => c.classList.remove('chip--active'));
        btn.classList.add('chip--active');
        const tag = btn.dataset.tag;
        document.querySelectorAll('.photo-wall__item').forEach((item) => {
          item.style.display = (tag === "all" || item.dataset.tag === tag) ? "" : "none";
        });
      });
    }

    async function renderPhotoWall() {
      const wall = document.getElementById('photo-wall');
      if (!wall) return;
      const photos = await fetchPhotos(0);
      const counts = {};
      wall.innerHTML = photos.map((photo, i) => {
        const tag = classifyPhoto(photo.caption);
        counts[tag] = (counts[tag] || 0) + 1;
        return `
<button type="button" class="photo-wall__item reveal" data-reveal-group="photo" data-tag="${tag}" data-src="${escapeHtml(photo.src)}" data-caption="${escapeHtml(photo.caption)}" aria-label="${IS_EN ? "Enlarge: " : "放大檢視："}${escapeHtml(photo.caption)}">
  <img src="${escapeHtml(photo.thumb)}" alt="${escapeHtml(photo.caption)}" loading="lazy">
</button>`;
      }).join('');

      wall.querySelectorAll('.photo-wall__item').forEach((btn) => {
        btn.addEventListener('click', () => {
          openLightbox(btn.dataset.src, btn.dataset.caption);
        });
      });

      renderFilter(counts);
      initReveal();
    }

    renderPhotoWall();
  </script>
  <script src="js/vendor/anime.umd.min.js"></script>
  <script src="js/micro.js"></script>
</body>
